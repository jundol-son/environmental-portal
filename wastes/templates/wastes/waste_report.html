{% extends 'base.html' %}

{% block title %}폐기물 분석 보고서{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-success"><i class="bi bi-file-earmark-medical"></i> 폐기물 배출 및 처리 분석 보고서</h2>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
                <i class="bi bi-printer"></i> PDF 저장/인쇄
            </button>
        </div>
    </div>

    {% for report in reports %}
    <div class="card shadow-sm border-0 p-5 mb-4" style="white-space: pre-wrap; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6;">
        {{ report|linebreaks }}
    </div>
    {% endfor %}
    
    <div class="mt-3 d-flex justify-content-between">
        <a href="{% url 'waste_list' %}" class="btn btn-light border">
            <i class="bi bi-list"></i> 목록으로 돌아가기
        </a>
        <p class="text-muted small">본 보고서는 선택된 폐기물 배출 내역을 기반으로 자동 생성되었습니다.</p>
    </div>
</div>

<style>
    /* 인쇄 시 버튼 등 불필요한 요소 숨기기 */
    @media print {
        #sidebar, .btn, .text-muted { display: none !important; }
        #content { padding: 0 !important; width: 100% !important; }
        .card { shadow: none !important; border: 1px solid #eee !important; }
    }
</style>
{% endblock %}
