{% extends 'base.html' %}

{% block title %}화관법 점검 시스템 (외부 연동){% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="height: calc(100vh - 180px); overflow: hidden; position: relative;">
    <div class="position-absolute w-100 h-100 d-flex justify-content-center align-items-center bg-white" id="loader" style="z-index: 5;">
        <div class="spinner-border text-primary" role="status"></div>
        <span class="ms-2">외부 시스템 연결 중...</span>
    </div>
    
    <iframe src="{{ external_url }}" 
            width="100%" 
            height="100%" 
            frameborder="0" 
            onload="document.getElementById('loader').style.display='none';"
            allowfullscreen>
    </iframe>
</div>
{% endblock %}
