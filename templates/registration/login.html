<!DOCTYPE html>
<html>
<head>
    <title>로그인 - PB 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 1rem; }
        .btn-sso { margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        /* 장고 폼 입력창에 부트스트랩 스타일 강제 적용 */
        input[type="text"], input[type="password"] {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            background-clip: padding-box;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="card shadow-sm login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold">🏦 PB 시스템</h2>
            <p class="text-muted">서비스 이용을 위해 로그인해주세요.</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger p-2 small text-center">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">아이디</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">로그인</button>
        </form>

        <div class="text-center mt-3">
            <a href="/accounts/signup/" class="text-decoration-none small">아직 계정이 없으신가요? 회원가입</a>
        </div>

        <hr class="my-4">

        <div class="d-grid gap-2">
            <button class="btn btn-outline-dark btn-sso" disabled>
                <img src="https://www.google.com/favicon.ico" width="18"> Google로 로그인 (준비중)
            </button>
            <button class="btn btn-outline-primary btn-sso" disabled>
                <img src="https://www.microsoft.com/favicon.ico" width="18"> Microsoft SSO (준비중)
            </button>
        </div>
    </div>

    {% if form.errors %}
    <script>
        // 간단한 팝업을 선호하신다면 주석을 해제하세요.
        alert("로그인 정보를 다시 확인해주세요.");
    </script>
    {% endif %}
</body>
</html>
