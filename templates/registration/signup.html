<!DOCTYPE html>
<html lang="ko"> <head>
    <title>회원가입 - PB 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 450px; padding: 2rem; border-radius: 1rem; }
        
        /* 입력창 스타일 강제 적용 */
        input[type="text"], input[type="password"], input[type="email"] {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            margin-bottom: 10px;
        }
        /* 장고 기본 도움말(Help text) 스타일 */
        .helptext { display: block; font-size: 0.8em; color: #6c757d; margin-bottom: 15px; }
        ul { list-style: none; padding-left: 0; font-size: 0.8em; color: #dc3545; }
    </style>
</head>
<body>
    <div class="card shadow-sm login-card">
        <h3 class="text-center mb-4 fw-bold">회원가입</h3>
        
        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger p-2 small">
                    가입 정보에 오류가 있습니다. 내용을 확인해주세요.
                </div>
            {% endif %}

            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 mt-3">가입하기</button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="text-decoration-none small">이미 계정이 있나요? 로그인</a>
        </div>
    </div>
</body>
</html>
