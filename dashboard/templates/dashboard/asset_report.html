{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">통합 자산 관리 보고서</h2>
        <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
            <i class="bi bi-printer"></i> PDF 저장/인쇄
        </button>
    </div>

    {% for report in reports %}
    <div class="card shadow-sm border-0 p-4 mb-4" style="white-space: pre-wrap; font-family: 'Malgun Gothic', sans-serif;">
        {{ report|linebreaks }}
    </div>
    {% endfor %}
    
    <div class="mt-3">
        <a href="{% url 'asset_list' %}" class="btn btn-light">목록으로 돌아가기</a>
    </div>
</div>
{% endblock %}
